[package]
name = "convert-character"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Convert a directory of Mixamo FBX files into a single skinned glTF binary with embedded animations"

[dependencies]
ufbx = { workspace = true }
gltf-json = { workspace = true, features = ["names", "extras"] }
gltf = { workspace = true, features = ["names", "utils", "import", "extras"] }
serde_json = { workspace = true }
image = { workspace = true, features = ["png", "jpeg"] }
serde = { workspace = true, features = ["derive"] }

[lints]
workspace = true
