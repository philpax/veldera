[package]
name = "fuse-lab"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
license.workspace = true
description = "Offline workbench for terrain-collider border fusion: load an in-game tile dump, rebuild the colliders, and report per-border discrepancies"

[dependencies]
glam = { workspace = true }
image = { workspace = true, features = ["png"] }
martini_rtin = { workspace = true }
rayon = "1.11"
rocktree = { workspace = true }
rustc-hash = "2.1"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
veldera_geo = { workspace = true }
veldera_terrain_collider = { workspace = true }

[lints]
workspace = true
