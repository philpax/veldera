[package]
name = "veldera_physics"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
license.workspace = true
description = "Avian-based physics integration for Veldera: radial gravity, floating-origin shifting, and rocktree terrain colliders"

[dependencies]
avian3d = { workspace = true }
bevy = { workspace = true, features = [
    "bevy_asset",
    "bevy_gizmos",
    "bevy_render",
] }
glam = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tracing = { workspace = true }
rocktree = { workspace = true }
rocktree-decode = { workspace = true }
veldera_config = { workspace = true }
veldera_terrain_collider = { workspace = true }
veldera_geo = { workspace = true }

[lints]
workspace = true
