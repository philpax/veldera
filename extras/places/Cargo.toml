[package]
name = "veldera_places"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
license.workspace = true
description = "Geocoding and elevation lookup services for Veldera, backed by OpenStreetMap Nominatim and Open Elevation"

[dependencies]
bevy = { workspace = true }
# Platform-agnostic async channel for delivering results back to the main thread.
async-channel = { workspace = true }
serde = { workspace = true, features = ["derive"] }
# For URL encoding geocoding queries.
urlencoding = { workspace = true }
veldera_async = { workspace = true }

# Geocoding/elevation HTTP requests (native).
[target.'cfg(not(target_family = "wasm"))'.dependencies]
reqwest = { workspace = true, features = ["json"] }

# Geocoding/elevation HTTP requests (WASM).
[target.'cfg(target_family = "wasm")'.dependencies]
reqwest = { workspace = true, features = ["json"] }

[lints]
workspace = true
