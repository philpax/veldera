# Terrain-collider streaming. Trade physics fidelity against load to tune
# performance/quality at runtime.

# Max distance colliders load at, and the despawn radius for ranged entities (m).
range = 1000.0

# Radius (m) within which colliders mirror the loaded render set exactly
# (WYSIWYG): collision is the displayed composite by construction, so the
# ground under the player can never float above or sink below what's drawn.
# Beyond this radius the distance bands below take over.
wysiwyg_radius = 150.0

# Collider triangles thinner than this across their longest edge (m) are
# dropped as photogrammetry slivers (contact artifacts). Zero disables.
# Within the WYSIWYG radius, colliders follow the exact displayed meshes
# (which reach the deepest LoD tier), so this filter is what keeps the
# deepest tier's degenerate triangles out of physics.
min_collider_triangle_height = 0.01

# Skirt depth (m) extruded down from each collider tile's boundary edges,
# sealing the hairline cracks between neighbouring tiles at different LoD
# depths. Covers vertical mismatches up to this size. Zero disables.
collider_skirt_depth = 5.0

# Max trimesh collider builds per frame (the expensive part of collider
# streaming); bounds the frame cost during fast flight. Zero = uncapped.
max_collider_builds_per_frame = 4

# Seconds a newly selected collider path must stay selected before its
# trimesh is built, so selections that flicker during fast movement never
# pay a build. Regions with no live coverage bypass the gate. Zero disables.
collider_spawn_persistence_secs = 1.0

# Lead vector: load colliders ahead of the player before they arrive.
lead_time = 1.0          # lookahead time (s)
max_lead = 200.0         # cap on lead distance (m) so fast runs don't starve nearby
lead_speed_epsilon = 0.1 # below this speed (m/s) the lead is zero
velocity_smoothing = 0.25 # EWMA factor (~4-frame half-life at 60 Hz)

# Distance bands beyond the WYSIWYG radius: each
# [max_distance_m, depth_below_finest]. First band covering the
# (lead-adjusted) distance wins; resolved depth = finest octree depth minus
# the offset. Sorted ascending; beyond the last band, no collider loads.
bands = [
  [400.0, 2],
  [1000.0, 3],
]
