# Terrain-collider streaming. Trade physics fidelity against load to tune
# performance/quality at runtime.

# Max distance colliders load at, and the despawn radius for ranged entities (m).
range = 1000.0

# Radius (m) within which colliders mirror the loaded render set exactly
# (WYSIWYG): collision is the displayed composite by construction, so the
# ground under the player can never float above or sink below what's drawn.
# Beyond this radius the distance bands below take over.
wysiwyg_radius = 150.0

# Depth offset below the rendered LoD for the WYSIWYG mirror. 0 collides
# exactly the displayed meshes; 1 collides Google's own one-coarser
# reconstruction (~1/4 the triangles), at a measured ~0.2 m mean / ~0.6 m
# p95 collider-vs-display divergence per level on flat terrain. Falls back
# to the displayed mesh per node wherever the coarser data isn't loaded.
wysiwyg_depth_offset = 1

# Sub-octant carving: remove coarse band tiles' giant triangles over the
# finely-covered region around the player even when no whole octant is
# covered. Disabling removes carve-driven rebuild churn but lets
# range-straddling coarse tiles stack interpenetrating layers over the
# near field (the beach contact-solver meltdown).
collider_carve = true

# Collider triangles thinner than this across their longest edge (m) are
# dropped as photogrammetry slivers (contact artifacts). Zero disables.
# Within the WYSIWYG radius, colliders follow the exact displayed meshes
# (which reach the deepest LoD tier), so this filter is what keeps the
# deepest tier's degenerate triangles out of physics.
min_collider_triangle_height = 0.01

# Skirt depth (m) extruded down from each collider tile's boundary edges,
# sealing the hairline cracks between neighbouring tiles at different LoD
# depths. Covers vertical mismatches up to this size. Zero disables.
collider_skirt_depth = 5.0

# Horizontal outward displacement per metre of skirt descent. Slanted skirts
# are aprons: a vertical step at a tile border becomes a ramp of grade
# 1/slope that wheels and feet ride over instead of striking a wall.
# Zero keeps skirts vertical.
collider_skirt_slope = 2.0

# Edge fusion: snap a freshly built collider's outer border vertices to the
# mean of the adjacent selected tiles' source-mesh surfaces within this
# vertical range (m), closing the step between adjacent tiles outright.
# Zero disables — which also skips the lateral-neighbour scans, the
# adjacency re-conform rebuilds, and the neighbour-data build deferral
# (rims no longer depend on neighbours), leaving the skirts/aprons below
# as the only border treatment.
edge_fusion_range = 0.0

# Max time (s) a collider build waits for a lateral neighbour's source data
# to stream in before building without it (it re-conforms when the data
# lands). Zero disables the wait.
fusion_defer_secs = 0.25

# Collider simplification: vertices within the same tolerance-sized cell (m)
# merge before clipping and fusion, bounding surface deviation to roughly
# half this while culling density collision doesn't need. Zero disables.
collider_simplify_tolerance = 0.25

# Road colliders: carve the photogrammetry corridor around the host-supplied
# road ribbons and emit the smooth ribbon surface where each tile owns it.
# The ribbons are fitted by the game (OSM fetch -> fit -> overlay); the engine
# only carves and emits. The margin is the extra horizontal reach carved
# beyond each half-width; the vertical gate keeps overpasses and the ground
# beneath a bridge intact.
road_colliders = true
road_carve_margin = 1.0
road_vertical_gate = 2.0

# Max collider builds dispatched to background tasks per reconcile pass, so
# a band sweep can't queue hundreds at once. Builds run off-thread and
# commit when ready; pending work queues near-first. Zero = uncapped.
max_collider_builds_per_frame = 8

# Camera speed (m/s) above which collider refinement rebuilds (rim
# re-conform, mask refinement, progressive stale masking) pause; first
# coverage and coverage-critical rebuilds always run. Deferred refinements
# retry on a short timer and catch up when the camera slows. Zero disables.
collider_refine_max_speed = 50.0

# Seconds a newly selected collider path must stay selected before its
# trimesh is built, so selections that flicker during fast movement never
# pay a build. Regions with no live coverage bypass the gate. Zero disables.
collider_spawn_persistence_secs = 1.0

# Minimum octree depth a tile must reach before it hosts a collider (v3
# pipeline). Coarser tiles are skipped — their geometry is too low-resolution
# to be useful collision, and they otherwise stack coarse over-coverage on the
# near field. Trades far-field/partial fallback collision for a cleaner near
# field. Zero builds at every depth.
collider_min_depth = 10

# v3 voxel wrap: each tile's collider is rebuilt from a voxel field into a
# clean watertight surface instead of reusing the photogrammetry soup.
# Smaller voxels keep man-made edges sharper (they round over fewer cells) but
# cost more per tile; the grid is coarsened past wrap_voxel_size wherever a
# tile would exceed wrap_max_grid_dim, so raise the cap to let small voxels
# take effect on larger tiles (cubic cost).
wrap_voxel_size = 0.15
wrap_max_grid_dim = 160
# Seal band (voxels) closing holes the flood would leak through.
wrap_seal_voxels = 0.5
# Solidify each column below its top surface so ground is a thick half-space
# (the validated baseline; off makes flat ground blobby and erodable).
wrap_solidify_below_top = true
# Morphological open radius and sign-smoothing passes (both 0 in the baseline;
# solidify makes them unnecessary).
wrap_open_radius = 0
wrap_sign_smooth_passes = 0
# Drop solid voxel components / extracted mesh islands below these fractions of
# the largest, removing floaters and isolated slabs.
wrap_solid_component_fraction = 0.02
wrap_mesh_component_fraction = 0.05
# Pre-solidify floater cull: drop disconnected solid shells below this fraction
# of the largest before the column solidify, so floating photogrammetry
# fragments don't become full-height curtain walls. Raise toward ~0.2-0.4 to
# catch bigger floaters (risks dropping a surface split into pieces by the
# octant mask); 0 disables.
wrap_floater_fraction = 0.1
# Quadric decimation error bound, relative to tile extent (native only). Zero
# disables decimation (dense Surface Nets output).
wrap_decimate_error = 0.01

# Lead vector: load colliders ahead of the player before they arrive.
lead_time = 1.0          # lookahead time (s)
max_lead = 200.0         # cap on lead distance (m) so fast runs don't starve nearby
lead_speed_epsilon = 0.1 # below this speed (m/s) the lead is zero
velocity_smoothing = 0.25 # EWMA factor (~4-frame half-life at 60 Hz)

# Distance bands beyond the WYSIWYG radius: each
# [max_distance_m, depth_below_finest]. First band covering the
# (lead-adjusted) distance wins; resolved depth = finest octree depth minus
# the offset. Sorted ascending; beyond the last band, no collider loads.
bands = [
  [400.0, 2],
  [1000.0, 3],
]
