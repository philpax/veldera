# FPS controller ragdoll-trigger tuning.
# (Whether the skeletal rig is built is the separate `enable_skeletal` in
# config/camera/body/ragdoll.toml.)

# Master switch for the ragdoll feature. false = normal locomotion even at
# terminal velocity; true = ragdoll after sustained airtime.
enable_ragdoll = true
# Seconds of continuous airtime before the player ragdolls. Low enough that a
# real fall ragdolls promptly, high enough a normal jump (~0.8 s) doesn't.
airborne_threshold_s = 1.0
# Seconds of continuous ground contact required to exit ragdoll (avoids
# unragdolling on a single-tick bounce, but pops back up quickly once settled).
ground_recovery_s = 0.15
# Ground friction while ragdolling — much stronger than normal so a high-speed
# landing arrests almost on contact instead of skidding off the edge.
landing_friction = 40.0

# Capsule geometry. crouch_height_ratio = crouched height / upright height.
crouch_height_ratio = 0.5555556
# radius_ratio (capsule radius / height) clamp + Camera-tab slider bounds. Keep
# max strictly below 0.5 so the capsule keeps a non-empty cylinder segment.
min_radius_ratio = 0.05
max_radius_ratio = 0.49

# Look-pitch tolerance (radians) keeping pitch just shy of straight up/down so
# the look basis doesn't degenerate at the poles.
angle_epsilon = 0.001953125
