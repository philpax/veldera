# Skeletal ragdoll tuning (kinematic torso, dynamic limbs).
#
# The bone topology, anchor bone, and which bones are kinematic torso vs. dynamic
# limb are structural and stay in code (`player/body/ragdoll.rs`); only the
# numeric feel lives here.

# Master switch for the skeletal rig. false = the body keeps animating normally
# through a tumble (no rig built); true = spawn the kinematic-torso/dynamic-limb
# rig on ragdoll entry. (Whether the tumble triggers at all is the separate
# `enable_ragdoll` in config/player/fps.toml.)
enable_skeletal = true

# --- Capsule radii (metres) -------------------------------------------------
# The torso is fat so the chest/pelvis have real volume for limbs to collide
# against; limbs are thinner. A bone's capsule *length* is free (the distance to
# its child), so only the radius is tuned.
torso_radius_m = 0.12
leg_radius_m = 0.08
arm_radius_m = 0.05
shoulder_radius_m = 0.06
# Leaf bones (hands, feet, the neck anchor) have no child to span a capsule to,
# so they spawn as small spheres of this radius.
leaf_radius_m = 0.06
# Below this bone->child span the capsule would be degenerate, so a sphere is
# spawned instead.
min_capsule_length_m = 0.02

# --- Mass / damping ---------------------------------------------------------
# Uniform per-bone collider density (kg/m^3, ~5x water). Avian auto-computes
# mass, angular inertia, AND centre of mass from the capsule shape x density;
# the capsule's centroid sits partway down the bone, giving gravity a lever so
# the limb hangs. (A dynamic body with linear mass but no inertia NaNs under the
# smallest torque, so this path must stay a collider+density pair.)
bone_density_kg_per_m3 = 5000.0
# Damping (1/s) on a limb's velocity *relative to the player*. This replaces
# Avian's world-space LinearDamping, which at fall speed decelerated the limbs
# against the air while the torso was forced down at the player's velocity —
# streaming the limbs upward at tens of g and parking boots in front of the
# camera. Air resistance proper lives in [aero] below.
relative_linear_damping = 2.0
# Angular damping on dynamic limbs. Kept modest so the limbs actually swing;
# the muscle drive below provides the pose-aware damping that used to require
# cranking this to triple digits.
angular_damping = 6.0
# Bone-on-bone self-collision friction (terrain contact is off, so this doesn't
# affect landing).
bone_friction = 2.0

# --- Joint / anchor stability ----------------------------------------------
# Joint point compliance (m/N); lower = stiffer (less stretch under load).
# 1e-6 gives sub-mm stretch the skinned mesh hides entirely.
joint_compliance = 1e-6
# Time constant (s) for the kinematic neck anchor's soft velocity correction.
# The anchor rides the player's render velocity plus position_error / tau toward
# its pin target; keep this above the fixed timestep so the correction never
# overshoots. Smaller = tighter pin.
anchor_correction_tau_s = 0.04
# Max speed (m/s) any dynamic bone may diverge from the player velocity, clamped
# each tick before the solve. Stops a joint absorbing a large differential in
# one step (which shreds the mesh) while leaving room for a visible dangle.
bone_max_rel_speed_m_s = 12.0

# --- Joint angle limits (degrees) --------------------------------------------
# Shoulders and hips are swing cones around the entry pose, with the cone
# centre pitched toward body-forward so the limb can flex far more than it can
# extend (real hips manage ~120 deg of flexion but ~20 deg of extension). Knees
# and elbows are one-directional hinges measured from dead straight — they
# never hyperextend. Hands and feet keep small symmetric cones.
[joint_limits]
proximal_swing_deg = 70.0
proximal_twist_deg = 25.0
# Keep each cone pitch below proximal_swing_deg, so the entry pose stays inside
# the tilted cone.
hip_cone_pitch_deg = 30.0
shoulder_cone_pitch_deg = 20.0
knee_flexion_max_deg = 140.0
elbow_flexion_max_deg = 150.0
extremity_swing_deg = 40.0
extremity_twist_deg = 15.0

# --- Aerodynamic drag --------------------------------------------------------
# Quadratic drag against the airflow: deceleration = g * (speed / terminal)^2.
# This is what makes the limbs of a fast-falling body trail upward and flutter
# — the physical version of what world-space linear damping used to fake.
[aero]
# Speed at which drag balances gravity (m/s, ~human terminal velocity). 0
# disables drag.
terminal_speed_m_s = 55.0
# Cap on the drag deceleration (in g), so a 150 m/s yeet doesn't pin the limbs
# into their joint limits.
max_drag_g = 3.0

# --- Muscle tone ---------------------------------------------------------------
# Each tick a limb's angular velocity is blended toward the velocity that would
# carry it onto its target pose (the entry pose plus the [flail] oscillation).
# Weak gains read as a person straining against the tumble; zero reads as a
# corpse.
[muscle]
# Blend rate (1/s) toward the corrective angular velocity. 0 disables.
tone_per_s = 10.0
# Time constant (s) converting pose error to desired angular velocity; smaller
# = snappier pursuit of the target pose.
response_tau_s = 0.25
# Cap on the corrective angular velocity (rad/s).
max_angular_velocity_rad_s = 8.0
# Per-region strength: shoulders/hips, elbows/knees, hands/feet.
proximal_gain = 1.0
mid_gain = 0.8
extremity_gain = 0.5

# --- Flail ---------------------------------------------------------------------
# Procedural flail layered onto the muscle target: shoulders/hips stir their
# target around a cone, elbows/knees pump into flexion, and left/right limbs
# run in opposite phase — arms windmill, legs bicycle. Keep amplitudes inside
# the joint limits above or the targets just lean on the hard stops.
[flail]
arm_swing_deg = 30.0
arm_frequency_hz = 0.8
leg_swing_deg = 25.0
leg_frequency_hz = 1.0

# --- Torso pitch -----------------------------------------------------------------
# Lean the torso into the velocity direction while ragdolling: diving pitches
# the body face-down, launching upward leans it back. The lean pivots about the
# head, so the camera (and a future VR view) never moves — only the body swings
# below it.
[torso_pitch]
# Maximum lean (degrees). 0 disables.
max_deg = 32.0
# Fraction of the velocity vector's pitch angle the torso adopts.
velocity_gain = 0.5
# Smoothing time constant (s); also how fast the body straightens back up after
# landing.
tau_s = 0.45
# Speed (m/s) at which the lean reaches full strength; fades out below so a
# near-stationary tumble doesn't tilt the body.
full_strength_speed_m_s = 12.0
